<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生写真管理</title>

<style>
* { box-sizing: border-box; }

html, body {
  overflow-x: hidden;
  max-width: 100vw;
  font-family: -apple-system;
  margin: 0;
  padding: 10px;
  background: #f5f5f5;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.card {
  background: white;
  padding: 8px;
  border-radius: 10px;
  overflow: hidden;
}

.title {
  font-weight: bold;
  font-size: 14px;
}

.sub {
  font-size: 11px;
  color: #888;
}

.btn-group {
  display: flex;
  gap: 5px;
}

.type-btn {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
}

.have { background:#4CAF50; color:white; }
.not { background:#ddd; }
.all-btn { background:#2196F3; color:white; }

#sideMenu {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: white;
  transition: left 0.25s ease;
  z-index: 1000;
  padding: 10px;
  overflow-y: auto;
}

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  display: none;
  z-index: 999;
}

#totalProgress {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
  text-align:center;
  font-weight:bold;
}

.member-check {
  display:block;
  background:#fff;
  padding:8px;
  margin:4px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div style="display:flex; align-items:center; gap:10px;">
  <button onclick="toggleMenu()">☰</button>
  <h2 style="margin:0;">生写真管理</h2>
</div>

<input id="search" placeholder="検索" oninput="render()">

<div id="totalProgress"></div>

<div style="display:flex; gap:5px;">
  <button onclick="setFilter('all')">全て</button>
  <button onclick="setFilter('incomplete')">未コンプ</button>
  <button onclick="setFilter('complete')">コンプ</button>
</div>

<button onclick="toggleManage()">⚙️ 管理メニュー</button>

<div id="manageArea" style="display:none;">

  <input id="newMember" placeholder="メンバー追加">
  <button onclick="addMember()">メンバー登録</button>

  <hr>

  <input id="year" placeholder="年号（例：2025）">
  <input id="series" placeholder="シリーズ">

  <h3>対象メンバー選択</h3>
  <div style="display:flex; gap:5px;">
    <button onclick="selectAllMembers()">全選択</button>
    <button onclick="clearAllMembers()">全解除</button>
  </div>

  <div id="memberCheckboxList"></div>

  <button onclick="addItem()">選択メンバーに追加</button>

  <hr>

  <h3>CSV取り込み</h3>
  <p style="font-size:12px;">形式：メンバー名,年号,シリーズ</p>
  <input type="file" id="csvFile">
  <button onclick="importCSV()">CSV読み込み</button>

  <hr>

  <button onclick="resetData()" style="background:#e53935;color:white;font-weight:bold;">
    🗑 データ全削除
  </button>
</div>

<div id="list" class="grid"></div>

<div id="sideMenu">
  <h3>メニュー</h3>
  <div id="menuList"></div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<script>
let items = JSON.parse(localStorage.getItem("items")) || [];
let members = JSON.parse(localStorage.getItem("members")) || [];

let currentMember = "all";
let currentYear = "all";
let currentFilter = "all";

function save(){
  localStorage.setItem("items", JSON.stringify(items));
}

function saveMembers(){
  localStorage.setItem("members", JSON.stringify(members));
}

function toggleManage(){
  manageArea.style.display = manageArea.style.display === "none" ? "block" : "none";
  renderMemberCheckbox();
}

function toggleMenu(){
  if(sideMenu.style.left === "0px"){
    sideMenu.style.left = "-250px";
    overlay.style.display = "none";
    document.body.style.overflow = "auto";
  } else {
    sideMenu.style.left = "0px";
    overlay.style.display = "block";
    document.body.style.overflow = "hidden";
    renderMenu();
  }
}

function renderMenu(){
  let html = `<div style="padding:8px;" onclick="selectFromMenu('all','all')">全体</div>`;

  members.forEach(m=>{
    html += `<div style="font-weight:bold; padding:8px 4px;">👤 ${m}</div>`;

    const yearList = [...new Set(
      items.filter(i => i.name === m).map(i => i.year)
    )];

    yearList.forEach(y=>{
      const target = items.filter(i => i.name === m && i.year === y);

      let total = target.length * 3;
      let have = 0;

      target.forEach(i=>{
        have += Object.values(i.types).filter(v=>v).length;
      });

      let text = `${y} (${have}/${total})`;
      if(have === total && total > 0) text += " ✅";

      html += `
        <div style="padding:6px 0 6px 18px;"
          onclick="selectFromMenu('${m}','${y}')">
          └ ${text}
        </div>
      `;
    });
  });

  menuList.innerHTML = html;
}

function selectFromMenu(member, yearValue){
  currentMember = member;
  currentYear = yearValue;
  toggleMenu();
  render();
}

function addMember(){
  const m = newMember.value.trim();
  if(!m) return;

  if(!members.includes(m)){
    members.push(m);
    saveMembers();
  }

  newMember.value = "";
  renderMemberCheckbox();
  render();
}

function renderMemberCheckbox(){
  let html = "";

  members.forEach(m=>{
    html += `
      <label class="member-check">
        <input type="checkbox" value="${m}">
        ${m}
      </label>
    `;
  });

  memberCheckboxList.innerHTML = html;
}

function selectAllMembers(){
  document.querySelectorAll("#memberCheckboxList input")
    .forEach(cb => cb.checked = true);
}

function clearAllMembers(){
  document.querySelectorAll("#memberCheckboxList input")
    .forEach(cb => cb.checked = false);
}

function addItem(){
  const y = year.value.trim();
  const s = series.value.trim();

  if(!y || !s){
    alert("年号とシリーズを入力して");
    return;
  }

  const checked = document.querySelectorAll("#memberCheckboxList input:checked");

  if(checked.length === 0){
    alert("メンバーを選択して");
    return;
  }

  checked.forEach(cb=>{
    const m = cb.value;

    if(!items.some(i => i.name === m && i.year === y && i.series === s)){
      items.push({
        name: m,
        year: y,
        series: s,
        types:{ヨリ:false,チュウ:false,ヒキ:false}
      });
    }
  });

  save();
  render();
}

function importCSV(){
  const file = csvFile.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const rows = e.target.result.split(/\r?\n/);

    rows.forEach(r=>{
      if(!r.trim()) return;

      const [name, yearValue, seriesValue] = r.split(",");
      if(!name || !yearValue || !seriesValue) return;

      const m = name.trim();
      const y = yearValue.trim();
      const s = seriesValue.trim();

      if(!members.includes(m)) members.push(m);

      if(!items.some(i => i.name === m && i.year === y && i.series === s)){
        items.push({
          name:m,
          year:y,
          series:s,
          types:{ヨリ:false,チュウ:false,ヒキ:false}
        });
      }
    });

    save();
    saveMembers();
    renderMemberCheckbox();
    render();
  };

  reader.readAsText(file);
}

function setFilter(f){
  currentFilter = f;
  render();
}

function toggle(i,t){
  items[i].types[t] = !items[i].types[t];
  save();
  render();
}

function toggleAll(i){
  const t = items[i].types;
  const v = !(t.ヨリ && t.チュウ && t.ヒキ);

  t.ヨリ = v;
  t.チュウ = v;
  t.ヒキ = v;

  save();
  render();
}

function editItem(index){
  const item = items[index];

  const newYear = prompt("年号", item.year);
  if(!newYear) return;

  const newSeries = prompt("シリーズ名", item.series);
  if(!newSeries) return;

  item.year = newYear.trim();
  item.series = newSeries.trim();

  save();
  render();
}

function deleteItem(index){
  if(!confirm("このシリーズを削除する？")) return;

  items.splice(index,1);
  save();
  render();
}

function resetData(){
  if(!confirm("本当にすべて削除する？")) return;
  if(!confirm("戻せません。本当にOK？")) return;

  items = [];
  members = [];

  localStorage.removeItem("items");
  localStorage.removeItem("members");

  renderMemberCheckbox();
  render();
}

function renderTotalProgress(){
  let total = items.length * 3;
  let have = 0;

  items.forEach(i=>{
    have += Object.values(i.types).filter(v=>v).length;
  });

  const rate = total ? Math.floor((have / total) * 100) : 0;

  totalProgress.innerHTML = `全体進捗： ${have}/${total}（${rate}%）`;
}

function render(){
  renderTotalProgress();
  list.innerHTML = "";

  const kw = search.value.toLowerCase();

  items.forEach((item,i)=>{

    if(currentMember !== "all" && item.name !== currentMember) return;
    if(currentYear !== "all" && item.year !== currentYear) return;

    if(kw &&
      !item.name.toLowerCase().includes(kw) &&
      !item.year.toLowerCase().includes(kw) &&
      !item.series.toLowerCase().includes(kw)
    ) return;

    const count = Object.values(item.types).filter(v=>v).length;
    const isComplete = count === 3;

    if(currentFilter === "complete" && !isComplete) return;
    if(currentFilter === "incomplete" && isComplete) return;

    list.innerHTML += `
      <div class="card">

        <div>
          <div class="title">${item.series}</div>
          <div class="sub">${item.name} / ${item.year}</div>
        </div>

        <div class="btn-group">
          ${btn(i,"ヨリ",item.types.ヨリ)}
          ${btn(i,"チュウ",item.types.チュウ)}
          ${btn(i,"ヒキ",item.types.ヒキ)}
        </div>

        <div class="btn-group">
          <button class="type-btn all-btn" onclick="toggleAll(${i})">全部</button>
        </div>

        <div class="btn-group">
          <button onclick="editItem(${i})">✏️</button>
          <button onclick="deleteItem(${i})">🗑</button>
        </div>

      </div>
    `;
  });
}

function btn(i,t,on){
  return `<button class="type-btn ${on ? 'have' : 'not'}" onclick="toggle(${i},'${t}')">${t}</button>`;
}

renderMemberCheckbox();
render();
</script>

</body>
</html>
