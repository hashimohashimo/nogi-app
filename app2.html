<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生写真管理</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:-apple-system;
  background:#f5f5f5;
}

/* ヘッダー */
.header {
  display:flex;
  align-items:center;
  padding:10px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.header h2 {
  flex:1;
  text-align:center;
  margin:0;
}

.header button {
  width:40px;
  height:40px;
  font-size:18px;
  border:none;
  background:none;
}

/* 検索 */
.search { padding:10px; }
.search input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* 進捗 */
.progress {
  background:#fff;
  margin:10px;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

/* フィルター */
.filter {
  display:flex;
  gap:5px;
  padding:0 10px;
}
.filter button {
  flex:1;
  padding:8px;
}

/* リスト */
.list {
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:10px;
}

/* カード */
.card {
  display:flex;
  align-items:center;
  gap:6px;
  background:#fff;
  padding:8px;
  border-radius:10px;
  touch-action:none;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

/* 浮き */
.dragging {
  transform: scale(1.05) rotate(1deg);
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  z-index:1000;
}

/* ハンドル */
.handle {
  font-size:18px;
  padding:0 6px;
  cursor:grab;
  user-select:none;
}

/* 左 */
.title-area { flex:2; }
.title { font-size:13px; font-weight:bold; }
.sub { font-size:11px; color:#777; }

/* ボタン */
.btn-area { display:flex; gap:4px; }

.type-btn {
  padding:4px;
  font-size:11px;
  border-radius:6px;
}

.have { background:#4CAF50; color:#fff; }
.not { background:#ddd; }

.all-btn {
  padding:4px 8px;
  background:#2196F3;
  color:#fff;
  border-radius:6px;
}

/* 編集削除 */
.action-area {
  display:flex;
  gap:4px;
}
.action-area button {
  padding:4px 6px;
  font-size:11px;
}

/* サイド */
#side {
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#fff;
  overflow:auto;
  transition:.3s;
  z-index:1000;
  padding:10px;
}

#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  display:none;
}

/* 管理 */
#managePanel {
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:#fff;
  padding:10px;
  overflow:auto;
  transition:.3s;
}

#manageOverlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <button onclick="toggleMenu()">☰</button>
  <h2>生写真管理</h2>
  <button onclick="toggleManage()">⚙️</button>
</div>

<div class="search">
  <input id="search" placeholder="検索" oninput="render()">
</div>

<div class="progress" id="progress"></div>

<div class="filter">
  <button onclick="setFilter('all')">全て</button>
  <button onclick="setFilter('incomplete')">未コンプ</button>
  <button onclick="setFilter('complete')">コンプ</button>
</div>

<div class="list" id="list"></div>

<div id="side"></div>
<div id="overlay" onclick="toggleMenu()"></div>

<div id="managePanel">
<h3>管理</h3>

<input id="newMember" placeholder="メンバー追加">
<button onclick="addMember()">登録</button>

<hr>

<input id="year" placeholder="年号">
<input id="series" placeholder="シリーズ">

<div id="memberList"></div>

<button onclick="addItem()">追加</button>

<hr>

<input type="file" id="csv">
<button onclick="importCSV()">CSV</button>

<button onclick="reset()" style="background:red;color:#fff;">全削除</button>
</div>

<div id="manageOverlay" onclick="toggleManage()"></div>

<script>
let items = JSON.parse(localStorage.getItem("items")||"[]");
let members = JSON.parse(localStorage.getItem("members")||"[]");

let touchIndex=null;
let dragging=false;

function save(){
  localStorage.setItem("items",JSON.stringify(items));
  localStorage.setItem("members",JSON.stringify(members));
}

/* 表示 */
function render(){
  list.innerHTML="";

  items.forEach((item,i)=>{
    list.innerHTML+=`
    <div class="card">

      <div class="handle">≡</div>

      <div class="title-area">
        <div class="title">${item.series}</div>
        <div class="sub">${item.name} / ${item.year}</div>
      </div>

      <button class="all-btn" onclick="toggleAll(${i})">全部</button>

      <div class="btn-area">
        ${btn(i,"ヨリ")}
        ${btn(i,"チュウ")}
        ${btn(i,"ヒキ")}
      </div>

      <div class="action-area">
        <button onclick="edit(${i})">✏️</button>
        <button onclick="del(${i})">🗑</button>
      </div>

    </div>`;
  });

  enableDrag();
}

/* ボタン */
function btn(i,t){
  return `<button class="type-btn ${items[i].types[t]?'have':'not'}" onclick="toggle(${i},'${t}')">${t}</button>`;
}

function toggle(i,t){
  items[i].types[t]=!items[i].types[t];
  save();render();
}

function toggleAll(i){
  const v=!Object.values(items[i].types).every(x=>x);
  items[i].types={ヨリ:v,チュウ:v,ヒキ:v};
  save();render();
}

/* 並び替え */
function enableDrag(){
  const cards=document.querySelectorAll(".card");

  cards.forEach((card,index)=>{
    const handle=card.querySelector(".handle");

    handle.addEventListener("touchstart",(e)=>{
      e.stopPropagation();
      touchIndex=index;
      dragging=true;
      card.classList.add("dragging");
      navigator.vibrate?.(10);
    });

    handle.addEventListener("touchend",()=>{
      dragging=false;
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("dragging"));
    });

    card.addEventListener("touchmove",(e)=>{
      if(!dragging) return;

      e.preventDefault();

      const touch=e.touches[0];
      const target=document.elementFromPoint(touch.clientX,touch.clientY);
      const targetCard=target.closest(".card");
      if(!targetCard)return;

      const arr=[...cards];
      const targetIndex=arr.indexOf(targetCard);

      if(targetIndex!==touchIndex){
        const moved=items.splice(touchIndex,1)[0];
        items.splice(targetIndex,0,moved);
        touchIndex=targetIndex;
        save();
        render();
      }
    },{passive:false});
  });
}

/* 編集 */
function edit(i){
  let y=prompt("年号",items[i].year);
  if(y===null)return;

  let s=prompt("シリーズ",items[i].series);
  if(s===null)return;

  items[i].year=y.trim();
  items[i].series=s.trim();

  save();render();
}

/* 削除 */
function del(i){
  if(confirm("削除?")) items.splice(i,1);
  save();render();
}

/* 初期 */
render();
</script>

</body>
</html>
