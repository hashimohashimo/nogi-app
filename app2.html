<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生写真管理</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:-apple-system;
  background:#f5f5f5;
}

.header {
  display:flex;
  align-items:center;
  padding:10px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.header h2 {
  flex:1;
  text-align:center;
  margin:0;
}

.header button {
  width:40px;
  height:40px;
  font-size:18px;
  border:none;
  background:none;
}

.search { padding:10px; }

.search input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.filter {
  display:flex;
  gap:5px;
  padding:0 10px;
}

.filter button {
  flex:1;
  padding:8px;
}

.list {
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:10px;
}

.card {
  display:flex;
  align-items:center;
  gap:6px;
  background:#fff;
  padding:8px;
  border-radius:10px;
}

.title-area { flex:2; }

.title { font-size:13px; font-weight:bold; }
.sub { font-size:11px; color:#777; }

.btn-area { display:flex; gap:4px; }

.type-btn {
  padding:4px;
  font-size:11px;
  border-radius:6px;
}

.have { background:#4CAF50; color:#fff; }
.not { background:#ddd; }

.all-btn {
  padding:4px 8px;
  background:#2196F3;
  color:#fff;
  border-radius:6px;
}

.action-area {
  display:flex;
  gap:4px;
}

/* サイド */
#side {
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#fff;
  overflow:auto;
  transition:.3s;
  z-index:2000;
  padding:10px;
}

#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  display:none;
  z-index:1500;
}

/* 管理 */
#managePanel {
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:#fff;
  padding:10px;
  overflow:auto;
  transition:.3s;
  z-index:3000;
}

#manageOverlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:2500;
}
</style>
</head>

<body>

<div class="header">
  <button onclick="toggleMenu()">☰</button>
  <h2>生写真管理</h2>
  <button onclick="toggleManage()">⚙️</button>
</div>

<div class="search">
  <input id="search" placeholder="検索" oninput="render()">
</div>

<div class="filter">
  <button onclick="setFilter('all')">全て</button>
  <button onclick="setFilter('incomplete')">未コンプ</button>
  <button onclick="setFilter('complete')">コンプ</button>
</div>

<div class="list" id="list"></div>

<div id="side"></div>
<div id="overlay"></div>

<!-- 管理 -->
<div id="managePanel">
<h3>管理</h3>

<input id="newMember" placeholder="メンバー追加">
<button onclick="addMember()">登録</button>

<hr>

<input id="year" placeholder="年号">
<input id="series" placeholder="シリーズ">

<div id="memberList"></div>

<button onclick="addItem()">追加</button>

<hr>

<input type="file" id="csv">
<button onclick="importCSV()">CSV</button>

<button onclick="reset()" style="background:red;color:#fff;">全削除</button>
</div>

<div id="manageOverlay"></div>

<script>
let items = JSON.parse(localStorage.getItem("items")||"[]");
let members = JSON.parse(localStorage.getItem("members")||"[]");

let currentMember="all";
let currentYear="all";

/* 保存 */
function save(){
  localStorage.setItem("items",JSON.stringify(items));
  localStorage.setItem("members",JSON.stringify(members));
}

/* ===== サイド ===== */

function toggleMenu(){
  const open = side.style.left === "0px";

  if(open){
    side.style.left = "-260px";
    overlay.style.display = "none";
  }else{
    side.style.left = "0px";
    overlay.style.display = "block";
    renderMenu();
  }
}

overlay.onclick = toggleMenu;

function renderMenu(){
  let html = "<h3>メニュー</h3>";

  html += `<div onclick="selectMenu('all','all')">全体</div>`;

  members.forEach(m=>{
    html += `<div><b>${m}</b></div>`;

    const years = [...new Set(
      items.filter(i=>i.name===m).map(i=>i.year)
    )];

    years.forEach(y=>{
      const target = items.filter(i=>i.name===m && i.year===y);

      let total = target.length * 3;
      let have = 0;

      target.forEach(i=>{
        have += Object.values(i.types).filter(v=>v).length;
      });

      html += `<div onclick="selectMenu('${m}','${y}')">└ ${y} (${have}/${total})</div>`;
    });
  });

  side.innerHTML = html;
}

function selectMenu(m,y){
  currentMember = m;
  currentYear = y;
  toggleMenu();
  render();
}

/* ===== 管理 ===== */

function toggleManage(){
  const open = managePanel.style.right === "0px";

  if(open){
    managePanel.style.right = "-320px";
    manageOverlay.style.display = "none";
  }else{
    managePanel.style.right = "0px";
    manageOverlay.style.display = "block";
    renderMembers();
  }
}

managePanel.addEventListener("click", (e)=>{
  e.stopPropagation();
});

manageOverlay.onclick = toggleManage;

/* ===== メンバー ===== */

function addMember(){
  const m=newMember.value.trim();
  if(!m)return;

  if(!members.includes(m))members.push(m);

  newMember.value="";
  save();
}

function renderMembers(){
  memberList.innerHTML="";
  members.forEach(m=>{
    memberList.innerHTML+=`
      <label><input type="checkbox" value="${m}">${m}</label>`;
  });
}

/* ===== 追加 ===== */

function addItem(){
  const y=year.value.trim();
  const s=series.value.trim();

  if(!y||!s)return;

  document.querySelectorAll("#memberList input:checked").forEach(cb=>{
    items.push({
      name:cb.value,
      year:y,
      series:s,
      types:{ヨリ:0,チュウ:0,ヒキ:0}
    });
  });

  save();
  render();
}

/* ===== CSV（ここが修正ポイント） ===== */

function importCSV(){
  const f = csv.files[0];
  if(!f) return;

  const r = new FileReader();

  r.onload = e => {
    e.target.result.split("\n").forEach(l => {

      let [n,y,s] = l.split(",");

      if(!n || !y || !s) return;

      n = n.trim();
      y = y.trim();
      s = s.trim();

      items.push({
        name:n,
        year:y,
        series:s,
        types:{ヨリ:0,チュウ:0,ヒキ:0}
      });

      // ★ここが超重要（メンバー自動追加）
      if(!members.includes(n)){
        members.push(n);
      }

    });

    save();
    render();
  };

  r.readAsText(f);
}

/* ===== 操作 ===== */

function toggle(i,t){
  items[i].types[t]=!items[i].types[t];
  save();render();
}

function toggleAll(i){
  const v=!Object.values(items[i].types).every(x=>x);
  items[i].types={ヨリ:v,チュウ:v,ヒキ:v};
  save();render();
}

/* ===== 表示 ===== */

function render(){
  list.innerHTML="";

  items.forEach((item,i)=>{

    if(currentMember!=="all" && item.name!==currentMember) return;
    if(currentYear!=="all" && item.year!==currentYear) return;

    list.innerHTML+=`
      <div class="card">
        <div class="title-area">
          <div class="title">${item.series}</div>
          <div class="sub">${item.name} / ${item.year}</div>
        </div>

        <button class="all-btn" onclick="toggleAll(${i})">全部</button>

        <div class="btn-area">
          ${btn(i,"ヨリ")}
          ${btn(i,"チュウ")}
          ${btn(i,"ヒキ")}
        </div>

        <div class="action-area">
          <button onclick="edit(${i})">✏️</button>
          <button onclick="del(${i})">🗑</button>
        </div>
      </div>`;
  });
}

function btn(i,t){
  return `<button class="type-btn ${items[i].types[t]?'have':'not'}" onclick="toggle(${i},'${t}')">${t}</button>`;
}

/* ===== 編集・削除 ===== */

function edit(i){
  let y=prompt("年号",items[i].year);
  if(y===null)return;

  let s=prompt("シリーズ",items[i].series);
  if(s===null)return;

  items[i].year=y.trim();
  items[i].series=s.trim();

  save();render();
}

function del(i){
  if(confirm("削除?")) items.splice(i,1);
  save();render();
}

/* ===== リセット ===== */

function reset(){
  if(confirm("全部削除?")){
    items=[];
    members=[];
    save();
    render();
  }
}

function setFilter(f){}

/* 初期 */
render();
</script>

</body>
</html>
