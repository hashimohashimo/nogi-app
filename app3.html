<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缶バッジ管理</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background:#efe3ff;
  overflow-x:hidden;
}

.header {
  display:flex;
  align-items:center;
  padding:10px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.header h2 {
  flex:1;
  text-align:center;
  margin:0;
  font-size:20px;
}

.header button {
  width:40px;
  height:40px;
  font-size:18px;
  border:none;
  background:none;
}

.list {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#fff;
  padding:10px;
  border-radius:12px;
}

.name-row {
  display:flex;
  align-items:center;
  gap:6px;
}

.member-color-icon {
  width:15px !important;
  height:15px !important;
  min-width:15px !important;
  max-width:15px !important;
  border-radius:50%;
  border:1px solid #999;
  flex:0 0 15px !important;
  display:inline-block;
}

.title {
  font-size:13px;
  font-weight:bold;
  word-break:break-word;
}

.sub {
  font-size:11px;
  color:#777;
  margin-top:3px;
}

.memo {
  font-size:11px;
  color:#444;
  background:#f3f3f3;
  border-radius:6px;
  padding:5px;
  margin-top:6px;
  word-break:break-word;
}

.counter-box {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-top:8px;
}

.counter-box button {
  width:32px;
  height:32px;
  font-size:16px;
}

.counter-box b {
  min-width:20px;
  text-align:center;
}

.price-input {
  width:100%;
  margin-top:8px;
  padding:7px;
  font-size:13px;
  border:1px solid #ccc;
  border-radius:6px;
  text-align:center;
  background:#fff;
}

.card-actions {
  display:flex;
  justify-content:flex-end;
  gap:6px;
  margin-top:8px;
  flex-wrap:wrap;
}

.card-actions button {
  height:28px;
  font-size:13px;
  padding:0;
  border-radius:6px;
  border:1px solid #ccc;
  background:#f2f2f2;
}

.mercari-icon-btn {
  width:30px !important;
  height:28px !important;
  padding:0 !important;
  border-radius:6px !important;
  border:1px solid #ccc !important;
  background:#fff !important;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.mercari-logo-mark {
  width:17px;
  height:17px;
  border-radius:5px;
  background:linear-gradient(135deg, #35c5f4 0%, #35c5f4 48%, #ff5a5f 48%, #ff5a5f 100%);
  color:#fff;
  font-size:11px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
}

.small-action-btn {
  width:30px;
  height:28px;
}

/* サイドバー */
#side {
  position:fixed;
  top:0;
  left:-320px;
  width:320px;
  height:100%;
  background:#fff;
  overflow:auto;
  transition:.3s;
  padding:14px;
  z-index:2000;
}

#side h3 {
  font-size:26px;
  margin:20px 0 28px;
}

.side-row {
  padding:8px 0;
  cursor:pointer;
  font-size:18px;
}

.side-series-row {
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:18px;
  font-size:20px;
  font-weight:bold;
}

.side-generation-row {
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 0 4px 22px;
  font-size:18px;
  font-weight:bold;
}

.tree-icon {
  width:24px;
  cursor:pointer;
  user-select:none;
}

.series-name,
.generation-name {
  flex:1;
  cursor:pointer;
  word-break:break-word;
}

.series-total,
.generation-total {
  font-size:16px;
  font-weight:bold;
  color:#333;
  min-width:36px;
  text-align:right;
}

.side-member-row {
  padding:8px 0 8px 52px;
  font-size:18px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  gap:8px;
}

.side-member-name {
  display:flex;
  align-items:center;
  gap:6px;
  min-width:0;
}

.side-member-name span:last-child {
  word-break:break-word;
}

.side-member-row:hover,
.side-row:hover,
.series-name:hover,
.generation-name:hover {
  background:#eee;
}

.member-count {
  font-weight:bold;
  min-width:24px;
  text-align:right;
}

#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  display:none;
  z-index:1500;
}

/* 管理メニュー */
#managePanel {
  position:fixed;
  top:0;
  right:-330px;
  width:320px;
  height:100%;
  background:#fff;
  padding:10px;
  overflow:auto;
  transition:.3s;
  z-index:3000;
}

#managePanel input,
#managePanel textarea,
#managePanel button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-family:inherit;
}

#managePanel textarea {
  min-height:90px;
  resize:vertical;
}

#managePanel button {
  background:#f5f5f5;
}

#managePanel .danger {
  background:red;
  color:#fff;
}

/* メンバー選択リスト */
.member-check {
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 4px;
  width:100%;
  font-size:16px;
  line-height:1.3;
}

.member-check input {
  width:18px !important;
  height:18px !important;
  min-width:18px !important;
  max-width:18px !important;
  margin:0 !important;
  padding:0 !important;
  flex:0 0 18px !important;
}

.member-check .member-color-icon {
  width:15px !important;
  height:15px !important;
  min-width:15px !important;
  max-width:15px !important;
  border-radius:50%;
  flex:0 0 15px !important;
}

.member-name-text {
  flex:1;
  min-width:0;
  word-break:keep-all;
}

#manageOverlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
  z-index:2500;
}

/* テンプレ管理 */
.template-help {
  font-size:12px;
  color:#666;
  background:#f7f7f7;
  padding:8px;
  border-radius:8px;
  line-height:1.6;
}

.template-item {
  border:1px solid #ddd;
  border-radius:8px;
  padding:8px;
  margin:8px 0;
  background:#fafafa;
}

.template-title {
  font-weight:bold;
  font-size:14px;
  margin-bottom:6px;
}

.template-actions {
  display:flex;
  gap:6px;
}

.template-actions button {
  width:50%;
  padding:7px;
  font-size:13px;
}

/* 出品テンプレ選択モーダル */
#templateOverlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  z-index:3500;
}

#templateModal {
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  width:300px;
  max-height:80vh;
  overflow:auto;
  background:#fff;
  border-radius:14px;
  padding:14px;
  display:none;
  z-index:4000;
  box-shadow:0 8px 30px rgba(0,0,0,0.25);
}

#templateModal h3 {
  margin:4px 0 12px;
  text-align:center;
  font-size:18px;
}

#templateModal button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
  background:#f7f7f7;
  font-size:15px;
}

#templateModal .cancel-btn {
  background:#eee;
  color:#555;
}

@media (max-width:600px){
  .list {
    grid-template-columns:repeat(2, 1fr);
  }

  #side {
    width:320px;
  }
}
</style>
</head>

<body>

<div class="header">
  <button onclick="toggleMenu()">☰</button>
  <h2>缶バッジ管理</h2>
  <button onclick="toggleManage()">⚙️</button>
</div>

<div class="list" id="list"></div>

<div id="side"></div>
<div id="overlay" onclick="toggleMenu()"></div>

<div id="managePanel">
  <h3>管理</h3>

  <input id="newMember" placeholder="メンバー追加">
  <button onclick="addMember()">メンバー登録</button>

  <hr>

  <input id="series" placeholder="シリーズ名">
  <input id="generation" placeholder="期生 例：3期生">

  <div id="memberList"></div>

  <button onclick="addItem()">選択メンバーに追加</button>

  <hr>

  <p style="font-size:12px;">
    CSV形式：メンバー名,シリーズ名,期生,個数,メルカリ金額,メモ
  </p>

  <input type="file" id="csv" accept=".csv,text/csv">
  <button onclick="importCSV()">CSV読み込み</button>
  <button onclick="exportCSV()">CSV書き出し</button>

  <hr>

  <h3>出品テンプレ管理</h3>

  <div class="template-help">
    使える差し込み：<br>
    {name} メンバー名<br>
    {series} シリーズ名<br>
    {generation} 期生<br>
    {count} 個数<br>
    {price} メルカリ金額<br>
    {memo} メモ
  </div>

  <input id="templateName" placeholder="テンプレ名 例：新品・未使用">
  <textarea id="templateTitle" placeholder="商品タイトル例：{name} {series} 缶バッジ"></textarea>
  <textarea id="templateBody" placeholder="説明文例：乃木坂46 {name}&#10;{series} 缶バッジです。&#10;&#10;即購入可能です。"></textarea>

  <button onclick="saveTemplate()">テンプレ保存</button>

  <div id="templateList"></div>

  <hr>

  <button onclick="reset()" class="danger">全削除</button>
</div>

<div id="manageOverlay" onclick="toggleManage()"></div>

<div id="templateOverlay" onclick="closeTemplateModal()"></div>

<div id="templateModal">
  <h3>出品テンプレを選択</h3>
  <div id="templateSelectList"></div>
  <button class="cancel-btn" onclick="closeTemplateModal()">キャンセル</button>
</div>

<script>
const memberColors = {
  "伊藤理々杏": ["#800080", "#ff0000"],
  "岩本蓮加": ["#ff69b4", "#ff0000"],
  "梅澤美波": ["#0000ff", "#87cefa"],
  "吉田綾乃クリスティー": ["#800080", "#ff69b4"],

  "遠藤さくら": ["#ffffff", "#ff69b4"],
  "賀喜遥香": ["#ffa500", "#008000"],
  "金川紗耶": ["#ff0000", "#87cefa"],
  "黒見明香": ["#800080", "#008000"],
  "佐藤璃果": ["#ff69b4", "#40e0d0"],
  "柴田柚菜": ["#0000ff", "#9acd32"],
  "田村真佑": ["#800080", "#87cefa"],
  "筒井あやめ": ["#800080", "#800080"],
  "林瑠奈": ["#ff69b4", "#ff69b4"],
  "松尾美佑": ["#40e0d0", "#ffffff"],
  "矢久保美緒": ["#ffff00", "#ff69b4"],
  "弓木奈於": ["#ff0000", "#9acd32"],

  "五百城茉央": ["#40e0d0", "#0000ff"],
  "池田瑛紗": ["#ffffff", "#008000"],
  "一ノ瀬美空": ["#87cefa", "#87cefa"],
  "井上和": ["#ffffff", "#ff0000"],
  "岡本姫奈": ["#800080", "#0000ff"],
  "小川彩": ["#ffffff", "#ffffff"],
  "奥田いろは": ["#ff69b4", "#9acd32"],
  "川﨑桜": ["#ff69b4", "#008000"],
  "菅原咲月": ["#ff69b4", "#87cefa"],
  "冨里奈央": ["#40e0d0", "#40e0d0"],
  "中西アルノ": ["#40e0d0", "#87cefa"],

  "愛宕心響": ["#ff69b4", "#0000ff"],
  "大越ひなの": ["#ffffff", "#ffff00"],
  "小津玲奈": ["#800080", "#40e0d0"],
  "海邉朱莉": ["#0000ff", "#ff0000"],
  "川端晃菜": ["#008000", "#87cefa"],
  "鈴木佑捺": ["#ffffff", "#87cefa"],
  "瀬戸口心月": ["#0000ff", "#ffff00"],
  "長嶋凛桜": ["#ff69b4", "#ffa500"],
  "増田三莉音": ["#0000ff", "#0000ff"],
  "森平麗心": ["#ffff00", "#ffff00"],
  "矢田萌華": ["#ffffff", "#800080"]
};

let items = JSON.parse(localStorage.getItem("items") || "[]");
let members = JSON.parse(localStorage.getItem("members") || "[]");
let openedSeries = JSON.parse(localStorage.getItem("openedSeries") || "{}");
let openedGeneration = JSON.parse(localStorage.getItem("openedGeneration") || "{}");
let listingTemplates = JSON.parse(localStorage.getItem("listingTemplates") || "[]");

let currentMember = "all";
let currentSeries = "all";
let currentGeneration = "all";
let listingTargetIndex = null;
let editingTemplateIndex = null;

items.forEach(item => {
  if(item.memo === undefined) item.memo = "";
  if(item.generation === undefined) item.generation = "未設定";
  if(item.mercariPrice === undefined) item.mercariPrice = "";
});

if(listingTemplates.length === 0){
  listingTemplates = [
    {
      name:"新品・未使用",
      title:"{name} {series} 缶バッジ",
      body:"乃木坂46 {name}\n{series} 缶バッジです。\n\n新品・未使用品です。\n初期傷等を気にされる方はご遠慮ください。\n\n即購入可能です。"
    },
    {
      name:"中古・目立った傷なし",
      title:"{name} {series} 缶バッジ",
      body:"乃木坂46 {name}\n{series} 缶バッジです。\n\n目立った傷はありませんが、一度人の手に渡ったものです。\n状態を細かく気にされる方はご遠慮ください。\n\n即購入可能です。"
    },
    {
      name:"まとめ売り",
      title:"乃木坂46 缶バッジ まとめ売り",
      body:"乃木坂46の缶バッジまとめ売りです。\n\nバラ売り相談可能です。\n状態を細かく気にされる方はご遠慮ください。\n\n即購入可能です。"
    }
  ];
}

function save(){
  localStorage.setItem("items", JSON.stringify(items));
  localStorage.setItem("members", JSON.stringify(members));
  localStorage.setItem("openedSeries", JSON.stringify(openedSeries));
  localStorage.setItem("openedGeneration", JSON.stringify(openedGeneration));
  localStorage.setItem("listingTemplates", JSON.stringify(listingTemplates));
}

function getMemberColorIcon(name){
  const colors = memberColors[name] || ["#dddddd", "#999999"];

  return `
    <span
      class="member-color-icon"
      style="background:linear-gradient(90deg, ${colors[0]} 0%, ${colors[0]} 50%, ${colors[1]} 50%, ${colors[1]} 100%);"
    ></span>
  `;
}

function toggleMenu(){
  managePanel.style.right = "-330px";
  manageOverlay.style.display = "none";

  if(side.style.left === "0px"){
    side.style.left = "-320px";
    overlay.style.display = "none";
  }else{
    side.style.left = "0px";
    overlay.style.display = "block";
    renderMenu();
  }
}

function renderMenu(){
  let html = "<h3>メニュー</h3>";

  html += `
    <div class="side-row" onclick="selectMenu('all','all','all')">
      全体
    </div>
  `;

  const seriesList = [...new Set(items.map(i => i.series))];

  seriesList.forEach(s => {
    const safeSeries = escapeText(s);
    const isSeriesOpen = openedSeries[s] !== false;

    const seriesItems = items.filter(i => i.series === s);
    const seriesTotalCount = seriesItems.reduce((sum, item) => sum + Number(item.count || 0), 0);

    html += `
      <div class="side-series-row">
        <div class="tree-icon" onclick="event.stopPropagation(); toggleSeriesTree('${safeSeries}')">
          ${isSeriesOpen ? "▼" : "▶"}
        </div>

        <div class="series-name" onclick="selectMenu('all','${safeSeries}','all')">
          ${escapeHTML(s)}
        </div>

        <div class="series-total">${seriesTotalCount}</div>
      </div>
    `;

    if(isSeriesOpen){
      const generations = [...new Set(seriesItems.map(i => i.generation || "未設定"))];

      generations.forEach(g => {
        const safeGen = escapeText(g);
        const key = s + "___" + g;
        const safeKey = escapeText(key);
        const isGenOpen = openedGeneration[key] !== false;

        const genItems = seriesItems.filter(i => (i.generation || "未設定") === g);
        const genTotalCount = genItems.reduce((sum, item) => sum + Number(item.count || 0), 0);

        html += `
          <div class="side-generation-row">
            <div class="tree-icon" onclick="event.stopPropagation(); toggleGenerationTree('${safeKey}')">
              ${isGenOpen ? "▼" : "▶"}
            </div>

            <div class="generation-name" onclick="selectMenu('all','${safeSeries}','${safeGen}')">
              ${escapeHTML(g)}
            </div>

            <div class="generation-total">${genTotalCount}</div>
          </div>
        `;

        if(isGenOpen){
          genItems.forEach(item => {
            html += `
              <div class="side-member-row" onclick="selectMenu('${escapeText(item.name)}','${escapeText(item.series)}','${escapeText(item.generation || "未設定")}')">
                <span class="side-member-name">
                  <span>└</span>
                  ${getMemberColorIcon(item.name)}
                  <span>${escapeHTML(item.name)}</span>
                </span>
                <span class="member-count">${item.count}</span>
              </div>
            `;
          });
        }
      });
    }
  });

  side.innerHTML = html;
}

function toggleSeriesTree(seriesName){
  openedSeries[seriesName] = openedSeries[seriesName] === false ? true : false;
  save();
  renderMenu();
}

function toggleGenerationTree(key){
  openedGeneration[key] = openedGeneration[key] === false ? true : false;
  save();
  renderMenu();
}

function selectMenu(m, s, g){
  currentMember = m;
  currentSeries = s;
  currentGeneration = g;
  toggleMenu();
  render();
}

function toggleManage(){
  side.style.left = "-320px";
  overlay.style.display = "none";

  if(managePanel.style.right === "0px"){
    managePanel.style.right = "-330px";
    manageOverlay.style.display = "none";
  }else{
    managePanel.style.right = "0px";
    manageOverlay.style.display = "block";
    renderMembers();
    renderTemplates();
  }
}

function addMember(){
  const m = newMember.value.trim();
  if(!m) return;

  if(!members.includes(m)){
    members.push(m);
  }

  newMember.value = "";
  save();
  renderMembers();
}

function renderMembers(){
  memberList.innerHTML = "";

  members.forEach(m => {
    memberList.innerHTML += `
      <label class="member-check">
        <input type="checkbox" value="${escapeHTML(m)}">
        ${getMemberColorIcon(m)}
        <span class="member-name-text">${escapeHTML(m)}</span>
      </label>
    `;
  });
}

function addItem(){
  const s = series.value.trim();
  const g = generation.value.trim() || "未設定";

  if(!s) return;

  const checked = document.querySelectorAll("#memberList input:checked");

  if(checked.length === 0){
    alert("メンバーを選択して");
    return;
  }

  checked.forEach(cb => {
    const m = cb.value;

    if(!items.some(i => i.name === m && i.series === s && (i.generation || "未設定") === g)){
      items.push({
        name:m,
        series:s,
        generation:g,
        count:0,
        mercariPrice:"",
        memo:""
      });
    }
  });

  if(openedSeries[s] === undefined) openedSeries[s] = true;

  const genKey = s + "___" + g;
  if(openedGeneration[genKey] === undefined) openedGeneration[genKey] = true;

  save();
  render();
  renderMembers();

  if(side.style.left === "0px") renderMenu();
}

function changeCount(i, d){
  items[i].count += d;

  if(items[i].count < 0){
    items[i].count = 0;
  }

  save();
  render();

  if(side.style.left === "0px") renderMenu();
}

function updateMercariPrice(i, value){
  items[i].mercariPrice = value;
  save();
}

function render(){
  list.innerHTML = "";

  items.forEach((item, i) => {
    const gen = item.generation || "未設定";

    if(currentMember !== "all" && item.name !== currentMember) return;
    if(currentSeries !== "all" && item.series !== currentSeries) return;
    if(currentGeneration !== "all" && gen !== currentGeneration) return;

    const memoHTML = item.memo && item.memo.trim()
      ? `<div class="memo">メモ：${escapeHTML(item.memo)}</div>`
      : "";

    list.innerHTML += `
      <div class="card">
        <div class="name-row">
          ${getMemberColorIcon(item.name)}
          <div class="title">${escapeHTML(item.name)}</div>
        </div>

        <div class="sub">${escapeHTML(item.series)} / ${escapeHTML(gen)}</div>

        <div class="counter-box">
          <button onclick="changeCount(${i},-1)">−</button>
          <b>${item.count}</b>
          <button onclick="changeCount(${i},1)">＋</button>
        </div>

        <input
          class="price-input"
          type="number"
          inputmode="numeric"
          placeholder="メルカリ金額"
          value="${escapeHTML(item.mercariPrice || "")}"
          oninput="updateMercariPrice(${i}, this.value)"
        >

        ${memoHTML}

        <div class="card-actions">
          <button class="mercari-icon-btn" onclick="openMercari(${i})">
            <span class="mercari-logo-mark">m</span>
          </button>
          <button class="small-action-btn" onclick="openListingTemplate(${i})">📤</button>
          <button class="small-action-btn" onclick="editItem(${i})">✏️</button>
          <button class="small-action-btn" onclick="deleteItem(${i})">🗑</button>
        </div>
      </div>
    `;
  });
}

function openMercari(i){
  const item = items[i];
  const keyword = `${item.name} ${item.series} 缶バッジ`;
  const url = "https://jp.mercari.com/search?keyword=" + encodeURIComponent(keyword);
  window.open(url, "_blank");
}

function openListingTemplate(i){
  listingTargetIndex = i;
  renderTemplateSelectList();
  templateOverlay.style.display = "block";
  templateModal.style.display = "block";
}

function closeTemplateModal(){
  listingTargetIndex = null;
  templateOverlay.style.display = "none";
  templateModal.style.display = "none";
}

function renderTemplateSelectList(){
  if(listingTemplates.length === 0){
    templateSelectList.innerHTML = `<p style="text-align:center;color:#666;">テンプレがありません</p>`;
    return;
  }

  let html = "";

  listingTemplates.forEach((t, index) => {
    html += `
      <button onclick="useListingTemplate(${index})">
        ${escapeHTML(t.name)}
      </button>
    `;
  });

  templateSelectList.innerHTML = html;
}

function useListingTemplate(templateIndex){
  if(listingTargetIndex === null) return;

  const item = items[listingTargetIndex];
  const template = listingTemplates[templateIndex];

  const title = applyTemplate(template.title, item);
  const body = applyTemplate(template.body, item);

  const copyText =
`${title}

${body}`;

  copyToClipboard(copyText);

  closeTemplateModal();

  alert("出品用タイトル・説明文をコピーしました。メルカリ出品画面を開きます。");

  window.open("https://jp.mercari.com/sell", "_blank");
}

function applyTemplate(text, item){
  return String(text || "")
    .replaceAll("{name}", item.name || "")
    .replaceAll("{series}", item.series || "")
    .replaceAll("{generation}", item.generation || "")
    .replaceAll("{count}", item.count ?? "")
    .replaceAll("{price}", item.mercariPrice || "")
    .replaceAll("{memo}", item.memo || "");
}

function copyToClipboard(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(() => {
      fallbackCopy(text);
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
}

function saveTemplate(){
  const name = templateName.value.trim();
  const title = templateTitle.value.trim();
  const body = templateBody.value.trim();

  if(!name || !title || !body){
    alert("テンプレ名・タイトル・説明文を入力して");
    return;
  }

  const data = { name, title, body };

  if(editingTemplateIndex === null){
    listingTemplates.push(data);
  }else{
    listingTemplates[editingTemplateIndex] = data;
    editingTemplateIndex = null;
  }

  templateName.value = "";
  templateTitle.value = "";
  templateBody.value = "";

  save();
  renderTemplates();
}

function renderTemplates(){
  if(listingTemplates.length === 0){
    templateList.innerHTML = `<p style="font-size:12px;color:#666;">テンプレがありません</p>`;
    return;
  }

  let html = "";

  listingTemplates.forEach((t, index) => {
    html += `
      <div class="template-item">
        <div class="template-title">${escapeHTML(t.name)}</div>
        <div style="font-size:12px;color:#666;white-space:pre-wrap;">${escapeHTML(t.title)}</div>
        <div class="template-actions">
          <button onclick="editTemplate(${index})">編集</button>
          <button onclick="deleteTemplate(${index})">削除</button>
        </div>
      </div>
    `;
  });

  templateList.innerHTML = html;
}

function editTemplate(index){
  const t = listingTemplates[index];

  templateName.value = t.name;
  templateTitle.value = t.title;
  templateBody.value = t.body;

  editingTemplateIndex = index;

  alert("下の入力欄にテンプレを読み込みました。修正して「テンプレ保存」を押してください。");
}

function deleteTemplate(index){
  if(!confirm("このテンプレを削除しますか？")) return;

  listingTemplates.splice(index, 1);
  save();
  renderTemplates();
}

function editItem(i){
  const item = items[i];

  const newName = prompt("メンバー名", item.name);
  if(newName === null) return;

  const newSeries = prompt("シリーズ名", item.series);
  if(newSeries === null) return;

  const newGeneration = prompt("期生", item.generation || "未設定");
  if(newGeneration === null) return;

  const newMemo = prompt("メモ", item.memo || "");
  if(newMemo === null) return;

  if(!newName.trim() || !newSeries.trim()){
    alert("メンバー名とシリーズ名は空欄にできません");
    return;
  }

  const oldName = item.name;

  item.name = newName.trim();
  item.series = newSeries.trim();
  item.generation = newGeneration.trim() || "未設定";
  item.memo = newMemo.trim();

  if(!members.includes(item.name)){
    members.push(item.name);
  }

  const stillExists = items.some(x => x.name === oldName);
  if(!stillExists){
    members = members.filter(x => x !== oldName);
  }

  if(openedSeries[item.series] === undefined) openedSeries[item.series] = true;

  const genKey = item.series + "___" + item.generation;
  if(openedGeneration[genKey] === undefined) openedGeneration[genKey] = true;

  save();
  render();

  if(side.style.left === "0px") renderMenu();
}

function deleteItem(i){
  if(!confirm("このデータを削除しますか？")) return;

  const oldName = items[i].name;

  items.splice(i, 1);

  const stillExists = items.some(x => x.name === oldName);
  if(!stillExists){
    members = members.filter(x => x !== oldName);
  }

  save();
  render();

  if(side.style.left === "0px") renderMenu();
}

function importCSV(){
  const f = csv.files[0];
  if(!f) return;

  const r = new FileReader();

  r.onload = e => {
    const lines = e.target.result.split(/\r?\n/);

    lines.forEach((line, index) => {
      if(!line.trim()) return;

      const cols = parseCSVLine(line);
      if(cols.length < 2) return;

      let n = "";
      let s = "";
      let g = "未設定";
      let c = 0;
      let price = "";
      let memo = "";

      if(index === 0 && line.includes("メンバー")) return;

      n = (cols[0] || "").trim();
      s = (cols[1] || "").trim();

      if(cols.length >= 6){
        g = (cols[2] || "").trim() || "未設定";
        c = Number((cols[3] || "0").trim());
        price = (cols[4] || "").trim();
        memo = (cols[5] || "").trim();
      }else if(cols.length === 5){
        g = (cols[2] || "").trim() || "未設定";
        c = Number((cols[3] || "0").trim());
        price = "";
        memo = (cols[4] || "").trim();
      }else{
        if(!isNaN(Number((cols[2] || "").trim()))){
          g = "未設定";
          c = Number((cols[2] || "0").trim());
          price = "";
          memo = (cols[3] || "").trim();
        }else{
          g = (cols[2] || "").trim() || "未設定";
          c = 0;
          price = "";
          memo = (cols[3] || "").trim();
        }
      }

      if(!n || !s) return;
      if(isNaN(c) || c < 0) c = 0;

      if(!members.includes(n)){
        members.push(n);
      }

      const existing = items.find(i =>
        i.name === n &&
        i.series === s &&
        (i.generation || "未設定") === g
      );

      if(existing){
        existing.count = c;
        existing.mercariPrice = price;
        existing.memo = memo;
      }else{
        items.push({
          name:n,
          series:s,
          generation:g,
          count:c,
          mercariPrice:price,
          memo:memo
        });
      }

      if(openedSeries[s] === undefined) openedSeries[s] = true;

      const genKey = s + "___" + g;
      if(openedGeneration[genKey] === undefined) openedGeneration[genKey] = true;
    });

    save();
    render();

    if(side.style.left === "0px") renderMenu();

    alert("CSVを読み込みました");
  };

  r.readAsText(f);
}

function exportCSV(){
  if(items.length === 0){
    alert("書き出すデータがありません");
    return;
  }

  let csvText = "メンバー名,シリーズ名,期生,個数,メルカリ金額,メモ\n";

  items.forEach(item => {
    csvText += [
      escapeCSV(item.name),
      escapeCSV(item.series),
      escapeCSV(item.generation || "未設定"),
      item.count,
      escapeCSV(item.mercariPrice || ""),
      escapeCSV(item.memo || "")
    ].join(",") + "\n";
  });

  const blob = new Blob(["\uFEFF" + csvText], {
    type: "text/csv;charset=utf-8;"
  });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = makeCSVFileName();

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

function makeCSVFileName(){
  const now = new Date();

  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const h = String(now.getHours()).padStart(2, "0");
  const min = String(now.getMinutes()).padStart(2, "0");

  return `缶バッジ管理_${y}${m}${d}_${h}${min}.csv`;
}

function escapeCSV(value){
  value = String(value ?? "");

  if(value.includes(",") || value.includes('"') || value.includes("\n")){
    value = '"' + value.replace(/"/g, '""') + '"';
  }

  return value;
}

function parseCSVLine(line){
  const result = [];
  let current = "";
  let inQuotes = false;

  for(let i = 0; i < line.length; i++){
    const ch = line[i];

    if(ch === '"'){
      if(inQuotes && line[i + 1] === '"'){
        current += '"';
        i++;
      }else{
        inQuotes = !inQuotes;
      }
    }else if(ch === "," && !inQuotes){
      result.push(current);
      current = "";
    }else{
      current += ch;
    }
  }

  result.push(current);
  return result;
}

function escapeText(text){
  return String(text)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'");
}

function escapeHTML(text){
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function reset(){
  if(!confirm("全部削除しますか？")) return;
  if(!confirm("元に戻せません。本当に削除しますか？")) return;

  items = [];
  members = [];
  openedSeries = {};
  openedGeneration = {};

  save();
  render();

  if(side.style.left === "0px") renderMenu();
}

save();
render();
</script>
